<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Facturas and asset value</title>
  <desc id="desc">Factura files, line items, and asset value matching.</desc>
  <rect width="1200" height="520" rx="28" fill="#f8fafc"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity=".10"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3z" fill="#94a3b8"/></marker>
  </defs>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="70" y="66" font-size="34" font-weight="700" fill="#0f172a">Facturas And Asset Value</text>
    <text x="70" y="100" font-size="18" fill="#475569">Review extracted purchase data before applying it to inventory.</text>
    <g filter="url(#shadow)">
      <rect x="90" y="160" width="260" height="195" rx="20" fill="#fff" stroke="#bfdbfe"/>
      <text x="122" y="220" font-size="28" font-weight="700" fill="#1e3a8a">Factura</text>
      <text x="122" y="266" font-size="17" fill="#475569">PDF or XML file</text>
      <text x="122" y="296" font-size="17" fill="#475569">Vendor and date</text>
      <path d="M365 258 H450" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
      <rect x="470" y="160" width="260" height="195" rx="20" fill="#fff" stroke="#bbf7d0"/>
      <text x="502" y="220" font-size="28" font-weight="700" fill="#14532d">Line Items</text>
      <text x="502" y="266" font-size="17" fill="#475569">Extract and review</text>
      <text x="502" y="296" font-size="17" fill="#475569">Match safely</text>
      <path d="M745 258 H830" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
      <rect x="850" y="160" width="260" height="195" rx="20" fill="#fff" stroke="#fde68a"/>
      <text x="882" y="220" font-size="28" font-weight="700" fill="#78350f">Asset Value</text>
      <text x="882" y="266" font-size="17" fill="#475569">Cost and warranty</text>
      <text x="882" y="296" font-size="17" fill="#475569">Lifecycle notes</text>
    </g>
    <rect x="210" y="420" width="780" height="54" rx="18" fill="#e2e8f0"/>
    <text x="600" y="454" font-size="18" text-anchor="middle" fill="#334155">Extraction is a helper. Human review is still required.</text>
  </g>
</svg>
