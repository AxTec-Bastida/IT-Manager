<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Assignments, loans, and stock issues</title>
  <desc id="desc">Comparison of responsibility workflows.</desc>
  <rect width="1200" height="520" rx="28" fill="#f8fafc"/>
  <defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity=".10"/></filter></defs>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="70" y="66" font-size="34" font-weight="700" fill="#0f172a">Choose The Right Workflow</text>
    <text x="70" y="100" font-size="18" fill="#475569">Keep long-term responsibility, temporary checkout, and consumables separate.</text>
    <g filter="url(#shadow)">
      <rect x="90" y="150" width="300" height="235" rx="22" fill="#fff" stroke="#bfdbfe"/>
      <text x="122" y="208" font-size="28" font-weight="700" fill="#1e3a8a">Assignment</text>
      <text x="122" y="255" font-size="17" fill="#475569">Long-term equipment</text>
      <text x="122" y="285" font-size="17" fill="#475569">Employee responsibility</text>
      <text x="122" y="315" font-size="17" fill="#475569">Return / unassign later</text>
      <rect x="450" y="150" width="300" height="235" rx="22" fill="#fff" stroke="#ddd6fe"/>
      <text x="482" y="208" font-size="28" font-weight="700" fill="#581c87">Asset Loan</text>
      <text x="482" y="255" font-size="17" fill="#475569">Temporary checkout</text>
      <text x="482" y="285" font-size="17" fill="#475569">Expected return date</text>
      <text x="482" y="315" font-size="17" fill="#475569">Good, damaged, lost</text>
      <rect x="810" y="150" width="300" height="235" rx="22" fill="#fff" stroke="#bbf7d0"/>
      <text x="842" y="208" font-size="28" font-weight="700" fill="#14532d">Stock Issue</text>
      <text x="842" y="255" font-size="17" fill="#475569">Generic item quantity</text>
      <text x="842" y="285" font-size="17" fill="#475569">Handout or loan</text>
      <text x="842" y="315" font-size="17" fill="#475569">Keyboard, cable, toner</text>
    </g>
    <rect x="210" y="420" width="780" height="54" rx="18" fill="#e2e8f0"/>
    <text x="600" y="454" font-size="18" text-anchor="middle" fill="#334155">When in doubt, scan first and open the matched record.</text>
  </g>
</svg>
