<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Photos and data quality compliance</title>
  <desc id="desc">Photo compliance, data quality, and safe cleanup actions.</desc>
  <rect width="1200" height="520" rx="28" fill="#f8fafc"/>
  <defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity=".10"/></filter></defs>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="70" y="66" font-size="34" font-weight="700" fill="#0f172a">Photo And Data Quality Review</text>
    <text x="70" y="100" font-size="18" fill="#475569">Use checklists and review queues to keep records audit-ready.</text>
    <g filter="url(#shadow)">
      <rect x="90" y="150" width="300" height="235" rx="22" fill="#fff" stroke="#bbf7d0"/>
      <text x="122" y="208" font-size="28" font-weight="700" fill="#14532d">Photos</text>
      <text x="122" y="255" font-size="17" fill="#475569">Overview</text>
      <text x="122" y="285" font-size="17" fill="#475569">Asset tag and serial</text>
      <text x="122" y="315" font-size="17" fill="#475569">Condition or damage</text>
      <rect x="450" y="150" width="300" height="235" rx="22" fill="#fff" stroke="#fed7aa"/>
      <text x="482" y="208" font-size="28" font-weight="700" fill="#7c2d12">Data Quality</text>
      <text x="482" y="255" font-size="17" fill="#475569">Duplicate IPs</text>
      <text x="482" y="285" font-size="17" fill="#475569">Missing fields</text>
      <text x="482" y="315" font-size="17" fill="#475569">Suspicious imports</text>
      <rect x="810" y="150" width="300" height="235" rx="22" fill="#fff" stroke="#ddd6fe"/>
      <text x="842" y="208" font-size="28" font-weight="700" fill="#581c87">Actions</text>
      <text x="842" y="255" font-size="17" fill="#475569">Open record</text>
      <text x="842" y="285" font-size="17" fill="#475569">Create task</text>
      <text x="842" y="315" font-size="17" fill="#475569">Export CSV</text>
    </g>
    <rect x="210" y="420" width="780" height="54" rx="18" fill="#e2e8f0"/>
    <text x="600" y="454" font-size="18" text-anchor="middle" fill="#334155">Only apply cleanup actions when the record is clearly safe.</text>
  </g>
</svg>
