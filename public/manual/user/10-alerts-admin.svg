<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Alerts, tasks, jobs, and backups workflow</title>
  <desc id="desc">Operational control loop for alerts, tasks, jobs, and backups.</desc>
  <rect width="1200" height="520" rx="28" fill="#f8fafc"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity=".10"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3z" fill="#94a3b8"/></marker>
  </defs>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="70" y="66" font-size="34" font-weight="700" fill="#0f172a">Operational Control Loop</text>
    <text x="70" y="100" font-size="18" fill="#475569">Turn system signals into tracked work, reminders, and recoverable backups.</text>
    <path d="M325 258 H388" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M595 258 H658" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M865 258 H928" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
    <g filter="url(#shadow)">
      <rect x="70" y="150" width="255" height="220" rx="20" fill="#fff" stroke="#fecaca"/>
      <text x="98" y="208" font-size="27" font-weight="700" fill="#7f1d1d">Alerts</text>
      <text x="98" y="254" font-size="17" fill="#475569">Low stock</text>
      <text x="98" y="284" font-size="17" fill="#475569">Overdue loans</text>
      <text x="98" y="314" font-size="17" fill="#475569">RMA and warranty</text>
      <rect x="390" y="150" width="205" height="220" rx="20" fill="#fff" stroke="#bfdbfe"/>
      <text x="418" y="208" font-size="27" font-weight="700" fill="#1e3a8a">Tasks</text>
      <text x="418" y="254" font-size="17" fill="#475569">Assign work</text>
      <text x="418" y="284" font-size="17" fill="#475569">Track owner</text>
      <text x="418" y="314" font-size="17" fill="#475569">Follow up</text>
      <rect x="660" y="150" width="205" height="220" rx="20" fill="#fff" stroke="#bbf7d0"/>
      <text x="688" y="208" font-size="27" font-weight="700" fill="#14532d">Jobs</text>
      <text x="688" y="254" font-size="17" fill="#475569">Refresh alerts</text>
      <text x="688" y="284" font-size="17" fill="#475569">Check due items</text>
      <text x="688" y="314" font-size="17" fill="#475569">Log results</text>
      <rect x="930" y="150" width="200" height="220" rx="20" fill="#fff" stroke="#fde68a"/>
      <text x="958" y="208" font-size="27" font-weight="700" fill="#78350f">Backups</text>
      <text x="958" y="254" font-size="17" fill="#475569">Database</text>
      <text x="958" y="284" font-size="17" fill="#475569">Asset photos</text>
      <text x="958" y="314" font-size="17" fill="#475569">Factura files</text>
    </g>
    <rect x="160" y="420" width="880" height="54" rx="18" fill="#e2e8f0"/>
    <text x="600" y="454" font-size="18" text-anchor="middle" fill="#334155">Admins manage users, settings, SMTP, jobs, backups, imports, and vault areas.</text>
  </g>
</svg>
