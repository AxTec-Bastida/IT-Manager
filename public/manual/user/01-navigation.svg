      <text x="98" y="194" font-size="26" font-weight="700" fill="#fff">Start Here</text>
      <text x="98" y="237" font-size="17" fill="#cbd5e1">Dashboard</text>
      <text x="98" y="268" font-size="17" fill="#cbd5e1">Quick Scan</text>
      <text x="98" y="299" font-size="17" fill="#cbd5e1">Inventory</text>
      <text x="98" y="330" font-size="17" fill="#cbd5e1">Workspace</text>
    </g>
    <path d="M320 265 H392" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
    <g filter="url(#shadow)">
      <rect x="410" y="142" width="210" height="244" rx="20" fill="#fff" stroke="#bfdbfe"/>
      <rect x="434" y="166" width="48" height="48" rx="14" fill="#dbeafe"/>
      <text x="458" y="198" font-size="23" text-anchor="middle" fill="#1d4ed8">1</text>
      <text x="434" y="249" font-size="24" font-weight="700" fill="#1e3a8a">Daily Work</text>
      <text x="434" y="288" font-size="16" fill="#475569">Scan</text>
      <text x="434" y="316" font-size="16" fill="#475569">Assign</text>
      <text x="434" y="344" font-size="16" fill="#475569">Move</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="650" y="142" width="210" height="244" rx="20" fill="#fff" stroke="#bbf7d0"/>
      <rect x="674" y="166" width="48" height="48" rx="14" fill="#dcfce7"/>
      <text x="698" y="198" font-size="23" text-anchor="middle" fill="#15803d">2</text>
      <text x="674" y="249" font-size="24" font-weight="700" fill="#14532d">Inventory</text>
      <text x="674" y="288" font-size="16" fill="#475569">Assets</text>
      <text x="674" y="316" font-size="16" fill="#475569">Labels</text>
      <text x="674" y="344" font-size="16" fill="#475569">Photos</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="890" y="142" width="240" height="244" rx="20" fill="#fff" stroke="#fde68a"/>
      <rect x="914" y="166" width="48" height="48" rx="14" fill="#fef3c7"/>
      <text x="938" y="198" font-size="23" text-anchor="middle" fill="#a16207">3</text>
      <text x="914" y="249" font-size="24" font-weight="700" fill="#78350f">Control</text>
      <text x="914" y="288" font-size="16" fill="#475569">Alerts</text>
      <text x="914" y="316" font-size="16" fill="#475569">Data quality</text>
      <text x="914" y="344" font-size="16" fill="#475569">Admin tools</text>
    </g>
    <rect x="190" y="420" width="820" height="54" rx="18" fill="#e2e8f0"/>
    <text x="600" y="454" font-size="18" text-anchor="middle" fill="#334155">Phone users should scan first, then open the focused workflow.</text>
