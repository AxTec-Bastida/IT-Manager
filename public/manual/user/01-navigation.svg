<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Navigation and daily start</title>
  <desc id="desc">A polished overview of the Warehouse IT app navigation areas.</desc>
  <rect width="1200" height="520" rx="28" fill="#f8fafc"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity=".10"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3z" fill="#94a3b8"/></marker>
  </defs>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="70" y="66" font-size="34" font-weight="700" fill="#0f172a">Navigation And Daily Start</text>
    <text x="70" y="100" font-size="18" fill="#475569">Start with the fastest entry point, then move into the right workflow.</text>
    <g filter="url(#shadow)">
