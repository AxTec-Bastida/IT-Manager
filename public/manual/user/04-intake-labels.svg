<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Intake and labels</title>
  <desc id="desc">Single asset, bulk asset, stock intake, and label generation.</desc>
  <rect width="1200" height="520" rx="28" fill="#f8fafc"/>
  <defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity=".10"/></filter></defs>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="70" y="66" font-size="34" font-weight="700" fill="#0f172a">Inventory Intake And Labels</text>
    <text x="70" y="100" font-size="18" fill="#475569">Create the right record type, then label it safely.</text>
    <g filter="url(#shadow)">
      <rect x="70" y="150" width="240" height="220" rx="20" fill="#fff" stroke="#bfdbfe"/>
      <text x="100" y="205" font-size="25" font-weight="700" fill="#1e3a8a">Single Asset</text>
      <text x="100" y="250" font-size="16" fill="#475569">One serialized item</text>
      <text x="100" y="278" font-size="16" fill="#475569">Tag, serial, model</text>
      <text x="100" y="306" font-size="16" fill="#475569">Optional photos</text>
      <rect x="350" y="150" width="240" height="220" rx="20" fill="#fff" stroke="#bbf7d0"/>
      <text x="380" y="205" font-size="25" font-weight="700" fill="#14532d">Bulk Assets</text>
      <text x="380" y="250" font-size="16" fill="#475569">Ranges and patterns</text>
      <text x="380" y="278" font-size="16" fill="#475569">Preview first</text>
      <text x="380" y="306" font-size="16" fill="#475569">Generate labels</text>
      <rect x="630" y="150" width="240" height="220" rx="20" fill="#fff" stroke="#fde68a"/>
      <text x="660" y="205" font-size="25" font-weight="700" fill="#78350f">Stock Intake</text>
      <text x="660" y="250" font-size="16" fill="#475569">Consumables</text>
      <text x="660" y="278" font-size="16" fill="#475569">Quantity changes</text>
      <text x="660" y="306" font-size="16" fill="#475569">Movement history</text>
      <rect x="910" y="150" width="220" height="220" rx="20" fill="#fff" stroke="#fecaca"/>
      <text x="940" y="205" font-size="25" font-weight="700" fill="#7f1d1d">Labels</text>
      <text x="940" y="250" font-size="16" fill="#475569">Asset tag code</text>
      <text x="940" y="278" font-size="16" fill="#475569">Optional serial</text>
      <text x="940" y="306" font-size="16" fill="#475569">No secrets</text>
    </g>
    <rect x="215" y="420" width="770" height="54" rx="18" fill="#e2e8f0"/>
    <text x="600" y="454" font-size="18" text-anchor="middle" fill="#334155">Serialized equipment becomes assets. Generic supplies stay in stock.</text>
  </g>
</svg>
