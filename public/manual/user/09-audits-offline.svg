<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Audits and offline queue</title>
  <desc id="desc">Physical audit findings and offline action queue.</desc>
  <rect width="1200" height="520" rx="28" fill="#f8fafc"/>
  <defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity=".10"/></filter></defs>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="70" y="66" font-size="34" font-weight="700" fill="#0f172a">Audits And Offline Queue</text>
    <text x="70" y="100" font-size="18" fill="#475569">Record field observations, then review discrepancies safely.</text>
    <g filter="url(#shadow)">
      <rect x="95" y="148" width="470" height="250" rx="24" fill="#fff" stroke="#bfdbfe"/>
      <text x="130" y="208" font-size="30" font-weight="700" fill="#1e3a8a">Physical Audit</text>
      <text x="130" y="257" font-size="18" fill="#475569">Expected snapshot</text>
      <text x="130" y="291" font-size="18" fill="#475569">Found, missing, wrong area</text>
      <text x="130" y="325" font-size="18" fill="#475569">Unknown labels and duplicates</text>
      <rect x="635" y="148" width="470" height="250" rx="24" fill="#fff" stroke="#ddd6fe"/>
      <text x="670" y="208" font-size="30" font-weight="700" fill="#581c87">Offline Queue</text>
      <text x="670" y="257" font-size="18" fill="#475569">Queue supported actions</text>
      <text x="670" y="291" font-size="18" fill="#475569">Sync when online</text>
      <text x="670" y="325" font-size="18" fill="#475569">Review conflicts manually</text>
    </g>
    <rect x="230" y="430" width="740" height="42" rx="16" fill="#e2e8f0"/>
    <text x="600" y="458" font-size="16" text-anchor="middle" fill="#334155">Audits do not auto-change asset location or status.</text>
  </g>
</svg>
