<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Quick Scan workflow</title>
  <desc id="desc">Scan, match, review, and act workflow.</desc>
  <rect width="1200" height="520" rx="28" fill="#f8fafc"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity=".10"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3z" fill="#94a3b8"/></marker>
  </defs>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="70" y="66" font-size="34" font-weight="700" fill="#0f172a">Quick Scan</text>
    <text x="70" y="100" font-size="18" fill="#475569">Use one scan box to find assets, employees, stock, borrowers, and aliases.</text>
    <g filter="url(#shadow)">
      <rect x="85" y="155" width="240" height="210" rx="20" fill="#fff" stroke="#cbd5e1"/>
      <rect x="110" y="180" width="54" height="54" rx="16" fill="#e2e8f0"/>
      <text x="137" y="215" font-size="24" text-anchor="middle" fill="#0f172a">⌖</text>
      <text x="110" y="272" font-size="25" font-weight="700" fill="#0f172a">Scan</text>
      <text x="110" y="309" font-size="16" fill="#475569">Camera</text>
      <text x="110" y="336" font-size="16" fill="#475569">Scanner</text>
    </g>
    <path d="M335 260 H420" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
    <g filter="url(#shadow)">
      <rect x="440" y="155" width="240" height="210" rx="20" fill="#fff" stroke="#bfdbfe"/>
      <rect x="465" y="180" width="54" height="54" rx="16" fill="#dbeafe"/>
      <text x="492" y="215" font-size="23" text-anchor="middle" fill="#1d4ed8">✓</text>
      <text x="465" y="272" font-size="25" font-weight="700" fill="#1e3a8a">Match</text>
      <text x="465" y="309" font-size="16" fill="#475569">Asset or person</text>
      <text x="465" y="336" font-size="16" fill="#475569">Stock or borrower</text>
    </g>
    <path d="M690 260 H775" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
    <g filter="url(#shadow)">
      <rect x="795" y="155" width="320" height="210" rx="20" fill="#fff" stroke="#bbf7d0"/>
      <rect x="820" y="180" width="54" height="54" rx="16" fill="#dcfce7"/>
      <text x="847" y="215" font-size="22" text-anchor="middle" fill="#15803d">→</text>
      <text x="820" y="272" font-size="25" font-weight="700" fill="#14532d">Act</text>
      <text x="820" y="309" font-size="16" fill="#475569">Open, assign, loan, return</text>
      <text x="820" y="336" font-size="16" fill="#475569">Move, RMA, photo, issue stock</text>
    </g>
    <rect x="220" y="420" width="760" height="54" rx="18" fill="#e2e8f0"/>
    <text x="600" y="454" font-size="18" text-anchor="middle" fill="#334155">Always review the matched record before changing inventory history.</text>
  </g>
</svg>
