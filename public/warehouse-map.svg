<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="Sample warehouse floor map">
  <rect width="1200" height="720" fill="#f8fafc"/>
  <rect x="40" y="40" width="1120" height="640" fill="#ffffff" stroke="#94a3b8" stroke-width="4"/>
  <rect x="70" y="80" width="260" height="220" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="200" y="195" text-anchor="middle" font-family="Arial" font-size="28" fill="#0f172a">Receiving</text>
  <rect x="360" y="80" width="330" height="220" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="525" y="195" text-anchor="middle" font-family="Arial" font-size="28" fill="#0f172a">Pick Modules</text>
  <rect x="720" y="80" width="410" height="220" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="925" y="195" text-anchor="middle" font-family="Arial" font-size="28" fill="#0f172a">Packing</text>
  <rect x="70" y="340" width="430" height="300" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="285" y="500" text-anchor="middle" font-family="Arial" font-size="28" fill="#0f172a">Storage</text>
  <rect x="530" y="340" width="280" height="300" fill="#fae8ff" stroke="#a21caf" stroke-width="2"/>
  <text x="670" y="500" text-anchor="middle" font-family="Arial" font-size="28" fill="#0f172a">Returns</text>
  <rect x="840" y="340" width="290" height="300" fill="#ffe4e6" stroke="#e11d48" stroke-width="2"/>
  <text x="985" y="500" text-anchor="middle" font-family="Arial" font-size="28" fill="#0f172a">Shipping</text>
  <line x1="40" y1="320" x2="1160" y2="320" stroke="#cbd5e1" stroke-width="8" stroke-dasharray="16 18"/>
  <line x1="515" y1="40" x2="515" y2="680" stroke="#cbd5e1" stroke-width="8" stroke-dasharray="16 18"/>
</svg>
